version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Headless environment configuration
      - DISPLAY=
      - LIBGL_ALWAYS_INDIRECT=1
      - QT_QPA_PLATFORM=offscreen
      # TensorFlow optimization
      - TF_CPP_MIN_LOG_LEVEL=2
      - TF_ENABLE_ONEDNN_OPTS=0
      # MongoDB (update with your connection string)
      - MONGODB_URI=mongodb://mongo:27017
      - DATABASE_NAME=ai_music
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      # For development, mount app directory
      - ./Backend/app:/app/app
    restart: unless-stopped

  # Optional: MongoDB for local development
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
