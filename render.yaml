services:
  - type: web
    name: emotion-recognition
    env: python
    plan: free
    buildCommand: pip install -r emotion_recognition/requirements.txt
    startCommand: cd emotion_recognition && python api.py
    envVars:
      - key: PORT
        value: 5000

  - type: web
    name: raga-rasa-backend
    env: python
    plan: free
    buildCommand: pip install -r Backend/requirements.txt
    startCommand: cd Backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        sync: false
      - key: EMOTION_SERVICE_URL
        sync: false
